version: '3.9'

services:
  backend:
    build: ./backend
    container_name: payment-analyzer-backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: payment-analyzer-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
